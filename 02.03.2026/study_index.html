<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent {
            height: 300px;
            border: 1px solid red;
            margin: 30px;
            position: relative;
        }
        .child1, .child2 {
            width: 150px;
            height: 150px;
            border: 1px, solid blue;
            position: absolute;
            top: 10px;
            left: 10px
        }
        .child1{
            background-color: rgb(17, 105, 51);
            z-index: 1;
        }
        .child2{
            background-color: rgb(0, 255, 98);
            opacity: 0.5;
            top: 30px;
            left: 40px;
            z-index: 2;
        }
        .child1:hover, .child2:hover{
            z-index: 3;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
    </div>
</body>
</html>
