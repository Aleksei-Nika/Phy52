<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style_new.css">
</head>

<body>
    <header>
        <div class="wrapper">
            <p id="logo">LOGO</p>
            <nav>
                <a href="#">Home</a>
                <a href="#">Service</a>
                <a href="#">About</a>
                <a href="#">Contact</a>
            </nav>
            <a href="#modal" id="login">Login</a>
        </div>
    </header>
    <main>
        <div id="modal" class="modal-overlay">
            <a href="#" id="close">&times;</a>
            <form>
                <h2>Login</h2>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email">
                    <img src="images/email.png"> 
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password">
                    <img src="images/lock.png">
                </div>
                <div class="form-links">
                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>
                    <a href="#">Forget password?</a>
                </div>
                <button>Login</button>
                <p>Don't have an account?
                    <a href="#modal2">Register</a>
                </p>
            </form>
        </div>
    </main>

</body>

</html>
