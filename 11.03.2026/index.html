<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="order-from">
        <h1>Настройка тарифа</h1>
        <div class="step-block">
            <p class="step-title">Выберите пакет услуг</p>
            <div class="tariffs-grid">
                <!-- CARD 1 START -->
                <label class="tariff-card">
                    <input type="radio" name="triff" value="100" checked>
                    <div class="card-content">
                        <h3>Light</h3>
                        <p>100 ₽ / чел</p>
                    </div>
                </label>
                <!-- CARD 1 END -->
                <!-- CARD 2 START -->
                <label class="tariff-card">
                    <input type="radio" name="triff" value="300">
                    <div class="card-content">
                        <h3>Pro</h3>
                        <p>300 ₽ / чел</p>
                    </div>
                </label>
                <!-- CARD 2 END -->
                <!-- CARD 3 START -->
                <label class="tariff-card">
                    <input type="radio" name="triff" value="1000">
                    <div class="card-content">
                        <h3>Elite</h3>
                        <p>1000 ₽ / чел</p>
                    </div>
                </label>
                <!-- CARD 3 END -->
            </div>
        </div>
        <div class="step-block">
            <p class="step-title">Количество активных мест</p>
            <input id="range" type="range" name="capaciti" min="1" max="20" value="1">
            <p>Вы выбрали <span id="info">1</span> пользователей</p>
        </div>

        <div class="step-block">
            <p class="step-title">Техническое задание</p>
            <div class="file-wrapper">
                <input type="file" accept=".pdf">
                <p>Пожалуйста, прикрепите файл в формате PDF (не более 5МБ)</p>
            </div>
        </div>
        

    </div>
</body>
</html>
